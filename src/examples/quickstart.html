<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>FP-Devicer Quickstart Example</title>
	<script src="bundle.js"></script>
</head>
<body>
	<h1>FP-Devicer Quickstart Example</h1>
	<p>This example demonstrates how to set up a simple Express server that uses FP-Devicer to identify devices based on incoming requests.</p>
	<p id="content"></p>
	<script defer="defer">
		var Snatch = window.snatch
		agent = new Snatch({url:"http://localhost",method:"POST"});
		fetch("/identify", {
			method: "POST",
			headers: { "Content-Type": "application/json" },
			body: JSON.stringify(agent.dataset)
		}).then(res => res.json()).then(result => {
			console.log("Identification result from FP-Devicer: ", result);
			var p = document.getElementById("content");
			p.innerHTML = "<b>Your Device Data:</b> " + JSON.stringify(agent.dataset) + "<br>";
			p.innerHTML += "<b>Identification Result:</b> " + JSON.stringify(result) + "<br>";
		}).catch(err => {
			console.error("Error identifying device with FP-Devicer: ", err);
		});
	</script>
</body>
</html>
